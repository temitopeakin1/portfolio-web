<div class="min-h-screen flex flex-col bg-transparent">
  <header class="sticky top-0 z-50 flex items-center justify-between px-8 md:px-24 lg:px-32 py-4 backdrop-blur-md border-b border-[var(--border)]" style="background-color: var(--header-bg);">
    <a routerLink="/" class="flex items-center no-underline">
      <img src="assets/images/logo.svg" alt="Temitope" class="h-8 w-auto" />
    </a>
    <div class="flex items-center gap-4 md:gap-8">
      <nav
        class="hidden md:flex items-center gap-8"
      >
        <a routerLink="/" routerLinkActive="!text-[var(--accent)]" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Home</a>
        <a routerLink="/about" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">About</a>
        <a routerLink="/tech-stack" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Tech Stack</a>
        <a routerLink="/projects" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Projects</a>
        <a routerLink="/blog" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Blog</a>
        <a routerLink="/contact" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Contact</a>
        <a href="assets/documents/resume.pdf" target="_blank" rel="noopener noreferrer" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Resume</a>
      </nav>
      <button
        type="button"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        class="p-2 rounded-lg text-[var(--text-muted)] hover:text-[var(--text)] transition-colors"
      >
        @if (themeService.theme() === 'dark') {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        }
      </button>
      <button
        type="button"
        class="md:hidden flex flex-col gap-1.5 bg-transparent border-none cursor-pointer p-2"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen"
        aria-label="Toggle menu"
      >
        <span class="hamburger block w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-muted);" [class.open]="menuOpen"></span>
        <span class="hamburger block w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-muted);" [class.open]="menuOpen"></span>
        <span class="hamburger block w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-muted);" [class.open]="menuOpen"></span>
      </button>
    </div>
    <nav
      class="fixed md:hidden top-14 left-0 right-0 flex-col pt-8 pb-8 px-8 backdrop-blur-md border-b border-[var(--border)] z-40 items-center gap-6" style="background-color: var(--header-bg);"
      [class.flex]="menuOpen"
      [class.hidden]="!menuOpen"
    >
      <a routerLink="/" routerLinkActive="!text-[var(--accent)]" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Home</a>
      <a routerLink="/about" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">About</a>
      <a routerLink="/tech-stack" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Tech Stack</a>
      <a routerLink="/projects" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Projects</a>
      <a routerLink="/blog" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Blog</a>
      <a routerLink="/contact" routerLinkActive="!text-[var(--accent)]" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Contact</a>
      <a href="assets/documents/resume.pdf" target="_blank" rel="noopener noreferrer" (click)="closeMenu()" class="text-[var(--text-muted)] hover:text-[var(--accent)] no-underline text-[15px] font-medium transition-colors">Resume</a>
    </nav>
  </header>
  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>
  <footer class="py-6 text-center border-t border-[var(--border)] text-sm" style="color: var(--text-muted);">
    <p>&copy; {{ currentYear }} Temitope Akinmegha. All rights reserved.</p>
  </footer>
</div>
