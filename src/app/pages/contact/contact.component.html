<section class="py-16 px-8">
  <div class="max-w-[900px] mx-auto">
    <h1 class="text-4xl font-bold mb-2 tracking-tight" style="color: var(--text);">Get in Touch</h1>
    <p class="text-lg mb-12" style="color: var(--text-muted);">
      Have a project in mind or want to collaborate? I'd love to hear from you.
    </p>
    <div class="grid grid-cols-1 md:grid-cols-[300px_1fr] gap-12 items-start">
      <div class="flex flex-col gap-4 min-w-0">
        <div class="rounded-lg p-4 border" style="background-color: var(--bg-card); border-color: var(--border);">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">Email</h3>
          <a href="mailto:temitopeakinmegha@gmail.com" class="text-[15px] no-underline break-all" style="color: var(--accent);">temitopeakinmegha@gmail.com</a>
        </div>
        <div class="rounded-lg p-4 border" style="background-color: var(--bg-card); border-color: var(--border);">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">LinkedIn</h3>
          <a href="https://www.linkedin.com/in/akinmeghatemitope/" target="_blank" rel="noopener" class="text-[15px] no-underline" style="color: var(--accent);">linkedin.com/in/akinmeghatemitope/</a>
        </div>
        <div class="rounded-lg p-4 border" style="background-color: var(--bg-card); border-color: var(--border);">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">GitHub</h3>
          <a href="https://github.com/temitopeakin1" target="_blank" rel="noopener" class="text-[15px] no-underline" style="color: var(--accent);">github.com/temitopeakin1</a>
        </div>
      </div>
      <form class="rounded-xl p-6 border" style="background-color: var(--bg-card); border-color: var(--border);" (ngSubmit)="onSubmit()">
        @if (submitted) {
          <p class="text-base py-8" style="color: var(--accent);">Thanks for reaching out! I'll get back to you soon.</p>
        } @else {
          <div class="mb-5">
            <label for="name" class="block text-sm font-medium mb-2" style="color: var(--text);">Name</label>
            <input id="name" type="text" [(ngModel)]="name" name="name" required placeholder="Your name"
              class="w-full px-4 py-3 border rounded-lg text-[15px] font-sans focus:outline-none focus:ring-2"
              style="background-color: var(--bg); color: var(--text); border-color: var(--border);" />
          </div>
          <div class="mb-5">
            <label for="email" class="block text-sm font-medium mb-2" style="color: var(--text);">Email</label>
            <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="your&#64;email.com"
              class="w-full px-4 py-3 border rounded-lg text-[15px] font-sans focus:outline-none focus:ring-2"
              style="background-color: var(--bg); color: var(--text); border-color: var(--border);" />
          </div>
          <div class="mb-5">
            <label for="message" class="block text-sm font-medium mb-2" style="color: var(--text);">Message</label>
            <textarea id="message" [(ngModel)]="message" name="message" rows="5" required placeholder="Your message"
              class="w-full px-4 py-3 border rounded-lg text-[15px] font-sans focus:outline-none focus:ring-2 resize-y"
              style="background-color: var(--bg); color: var(--text); border-color: var(--border);"></textarea>
          </div>
          <button type="submit" class="border-none px-6 py-3 text-[15px] font-semibold rounded-lg cursor-pointer transition-colors" style="background-color: var(--accent); color: var(--btn-primary-text);">
            Send Message
          </button>
        }
      </form>
    </div>
  </div>
</section>
