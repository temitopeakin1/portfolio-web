<section class="py-16 px-8">
  <div class="max-w-[1100px] mx-auto">
    <h1 class="text-4xl font-bold mb-2 tracking-tight" style="color: var(--text);">Projects</h1>
    <p class="text-lg mb-12" style="color: var(--text-muted);">
      A selection of projects I've built or contributed to.
    </p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6">
      @for (project of projects; track project.title) {
        <article class="rounded-xl p-6 flex flex-col transition-all duration-200 hover:-translate-y-0.5 border" style="background-color: var(--bg-card); border-color: var(--border);">
          <h2 class="text-xl font-semibold mb-3" style="color: var(--text);">{{ project.title }}</h2>
          <p class="text-[15px] leading-relaxed mb-4 flex-1" style="color: var(--text-muted);">{{ project.description }}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            @for (tech of project.tech; track tech) {
              <span class="px-3 py-1 rounded-full text-xs font-medium" style="background-color: var(--bg-card); color: var(--accent); border: 1px solid var(--border);">{{ tech }}</span>
            }
          </div>
          <a [href]="project.link" class="text-[15px] font-semibold no-underline transition-colors" style="color: var(--accent);" target="_blank" rel="noopener">
            View Project →
          </a>
        </article>
      }
    </div>
  </div>
</section>
